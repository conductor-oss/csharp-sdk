name: CI Build

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - sdk-integration-tests-enhance # todo: remove this branch after testing
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Linter
        run: >
          DOCKER_BUILDKIT=1 docker build
          --target=linter
          --progress=plain
          .

  unit_tests:
    needs: lint
    runs-on: ubuntu-latest
    env:
      # TODO: unit test should not need this but i believe stuff is set up weirdly from legacy mashup of integration and unit test. please try testing without this and investigate what it will take to remove the requirement of this env var for a unit test.
      CONDUCTOR_SERVER_URL: http://localhost:8080/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run unit tests
        run: >
          dotnet test Tests/conductor-csharp.test.csproj
          -p:DefineConstants=EXCLUDE_EXAMPLE_WORKERS
          --filter "Category!=Integration&Category!=CloudIntegration"
          -l "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory coverage
      - name: Upload Cobertura artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: cobertura
          path: coverage/**/coverage.cobertura.xml
      - name: Codecov upload
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/**/coverage.cobertura.xml
          flags: unittests
          name: ${{ github.workflow }}-${{ github.job }}-${{ github.run_number }}

  integration_tests_v5:
    needs: lint
    runs-on: ubuntu-latest
    env:
      CONDUCTOR_SERVER_URL: ${{ secrets.CONDUCTOR_SERVER_URL }}
      CONDUCTOR_AUTH_KEY: ${{ secrets.CONDUCTOR_AUTH_KEY }}
      CONDUCTOR_AUTH_SECRET: ${{ secrets.CONDUCTOR_AUTH_SECRET }}
      GITHUB_RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Show server endpoint
        run: echo "CONDUCTOR_SERVER_URL=${CONDUCTOR_SERVER_URL#*://}"
      - name: Run integration tests (v5)
        run: >
          dotnet test Tests/conductor-csharp.test.csproj
          -p:DefineConstants=EXCLUDE_EXAMPLE_WORKERS
          --filter "Category=Integration"
          -l "console;verbosity=normal"

  integration_tests_legacy:
    needs: lint
    runs-on: ubuntu-latest
    env:
      CONDUCTOR_SERVER_URL: ${{ secrets.CONDUCTOR_SERVER_URL }}
      CONDUCTOR_AUTH_KEY: ${{ secrets.CONDUCTOR_AUTH_KEY }}
      CONDUCTOR_AUTH_SECRET: ${{ secrets.CONDUCTOR_AUTH_SECRET }}
      GITHUB_RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Show server endpoint
        run: echo "CONDUCTOR_SERVER_URL=${CONDUCTOR_SERVER_URL#*://}"
      - name: Run legacy integration tests
        run: >
          dotnet test Tests/conductor-csharp.test.csproj
          -p:DefineConstants=EXCLUDE_EXAMPLE_WORKERS
          --filter "Category=CloudIntegration"
          -l "console;verbosity=normal"

  integration_tests_legacy_v4:
    needs: lint
    runs-on: ubuntu-latest
    env:
      CONDUCTOR_SERVER_URL: ${{ vars.SERVER_URL }}
      CONDUCTOR_AUTH_KEY: ${{ secrets.AUTH_KEY }}
      CONDUCTOR_AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      GITHUB_RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Show server endpoint
        run: echo "CONDUCTOR_SERVER_URL=${CONDUCTOR_SERVER_URL#*://}"
      - name: Probe server version and health
        run: |
          BASE_URL="${CONDUCTOR_SERVER_URL}"
          # Strip trailing /api if present to reach the root
          ROOT_URL="${BASE_URL%/api}"
          ROOT_URL="${ROOT_URL%/}"

          echo "=== Probing ${ROOT_URL} ==="

          echo "--- GET /api/health ---"
          curl -sf --max-time 10 "${ROOT_URL}/api/health" 2>&1 || echo "(no response)"

          echo ""
          echo "--- GET /health (Spring Actuator) ---"
          curl -sf --max-time 10 "${ROOT_URL}/health" 2>&1 || echo "(no response)"

          echo ""
          echo "--- GET /actuator/info ---"
          curl -sf --max-time 10 "${ROOT_URL}/actuator/info" 2>&1 || echo "(no response)"

          echo ""
          echo "--- GET /api/environment/SDK_SERVER_VERSION (authed) ---"
          TOKEN=$(curl -sf --max-time 10 -X POST "${ROOT_URL}/api/token" \
            -H "Content-Type: application/json" \
            -d "{\"keyId\":\"${CONDUCTOR_AUTH_KEY}\",\"keySecret\":\"${CONDUCTOR_AUTH_SECRET}\"}" \
            | jq -r '.token // empty') || true

          if [ -n "$TOKEN" ]; then
            echo "Auth token obtained."
            curl -sf --max-time 10 -H "X-Authorization: ${TOKEN}" "${ROOT_URL}/api/environment" 2>&1 || echo "(no response)"
            echo ""
            echo "--- GET /api/workflow/search?size=0 (smoke test) ---"
            curl -sf --max-time 10 -H "X-Authorization: ${TOKEN}" "${ROOT_URL}/api/workflow/search?size=0" 2>&1 || echo "(no response)"
          else
            echo "Could not obtain auth token — skipping authed probes."
          fi
          echo ""
          echo "=== Done ==="
      - name: Run legacy integration tests (v4)
        run: >
          dotnet test Tests/conductor-csharp.test.csproj
          -p:DefineConstants=EXCLUDE_EXAMPLE_WORKERS
          --filter "Category=CloudIntegration"
          -l "console;verbosity=normal"


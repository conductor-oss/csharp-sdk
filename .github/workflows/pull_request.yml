name: CI Build

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Linter
        run: >
          DOCKER_BUILDKIT=1 docker build
          --target=linter
          --progress=plain
          .

  unit_tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test and collect coverage
        run: >
          dotnet test Tests/conductor-csharp.test.csproj
          -p:DefineConstants=EXCLUDE_EXAMPLE_WORKERS
          --filter "Category!=Integration&Category!=CloudIntegration"
          -l "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory coverage
      - name: Upload Cobertura artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: cobertura
          path: coverage/**/coverage.cobertura.xml
      - name: Codecov upload
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/out/coverage.cobertura.xml
          flags: unittests
          name: ${{ github.workflow }}-${{ github.job }}-${{ github.run_number }}

  integration_tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run integration tests
        run: >
          dotnet test Tests/conductor-csharp.test.csproj
          -p:DefineConstants=EXCLUDE_EXAMPLE_WORKERS
          --filter "Category=Integration"
          -l "console;verbosity=normal"

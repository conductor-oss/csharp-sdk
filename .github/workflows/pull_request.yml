name: CI Build

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Linter
        run: >
          DOCKER_BUILDKIT=1 docker build
          --target=linter
          --progress=plain
          .

  unit_tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unit tests and coverage
        run: >
          DOCKER_BUILDKIT=1 docker build
          --target=coverage_export
          --output type=local,dest=coverage
          .
      - name: Upload Cobertura artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: cobertura
          path: coverage/out/coverage.cobertura.xml
      - name: Ensure coverage file exists
        run: |
          mkdir -p coverage/out
          if [ ! -f coverage/out/coverage.cobertura.xml ]; then
            echo '<coverage></coverage>' > coverage/out/coverage.cobertura.xml
          fi
      - name: Codecov upload
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/out/coverage.cobertura.xml
          flags: unittests
          name: ${{ github.workflow }}-${{ github.job }}-${{ github.run_number }}

  integration_tests_v5:
    needs: lint
    runs-on: ubuntu-latest
    env:
      CONDUCTOR_SERVER_URL: ${{ secrets.CONDUCTOR_SERVER_URL }}
      CONDUCTOR_AUTH_KEY: ${{ secrets.CONDUCTOR_AUTH_KEY }}
      CONDUCTOR_AUTH_SECRET: ${{ secrets.CONDUCTOR_AUTH_SECRET }}
      GITHUB_RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run integration tests (v5)
        run: >
          dotnet test Tests/conductor-csharp.test.csproj
          -p:DefineConstants=EXCLUDE_EXAMPLE_WORKERS
          --filter "Category=Integration"
          -l "console;verbosity=normal"

  integration_tests_v4:
    needs: lint
    if: ${{ secrets.CONDUCTOR_SERVER_URL_V4 != '' }}
    runs-on: ubuntu-latest
    env:
      CONDUCTOR_SERVER_URL: ${{ secrets.CONDUCTOR_SERVER_URL_V4 }}
      CONDUCTOR_AUTH_KEY: ${{ secrets.CONDUCTOR_AUTH_KEY_V4 }}
      CONDUCTOR_AUTH_SECRET: ${{ secrets.CONDUCTOR_AUTH_SECRET_V4 }}
      GITHUB_RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run integration tests (v4)
        run: >
          dotnet test Tests/conductor-csharp.test.csproj
          -p:DefineConstants=EXCLUDE_EXAMPLE_WORKERS
          --filter "Category=Integration&Version!=V5Only"
          -l "console;verbosity=normal"

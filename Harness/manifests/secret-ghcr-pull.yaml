# GHCR Image Pull Secret
# This secret allows K8s to pull private container images from ghcr.io/conductor-oss
# OSS repos (csharp-sdk, python-sdk, java-sdk, etc.).
#
# The orkes-io org's regcredorkesgit secret does not have access to pull from
# OSS repo private packages, so we need a separate pull secret using a
# GitHub PAT (classic) with read:packages scope.
#
# Create this secret before deploying the worker.

# NOTE: Do NOT apply this file directly -- it is a reference/placeholder only.
# Use the kubectl command below to create the secret in the correct format.

# ============================================================================
# HOW TO CREATE THIS SECRET
# ============================================================================
#
# Use `kubectl create secret docker-registry` which automatically formats
# the credentials into the dockerconfigjson structure that K8s requires:
#
#   kubectl create secret docker-registry ghcr-oss-sdk \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USERNAME \
#     --docker-password=YOUR_GITHUB_PAT \
#     -n $NS
#
# Requirements:
#   - YOUR_GITHUB_PAT must be a GitHub PAT (classic) with read:packages scope
#   - The PAT owner must have access to the ghcr.io/conductor-oss/csharp-sdk packages
#   - Verify the PAT works first: docker login ghcr.io -u USERNAME -p PAT
#
# To verify the secret was created correctly:
#
#   kubectl get secret ghcr-oss-sdk -n $NS -o jsonpath='{.type}'
#   # should output: kubernetes.io/dockerconfigjson
#
# To inspect the contents (base64-decoded):
#
#   kubectl get secret ghcr-oss-sdk -n $NS \
#     -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d
#
# ============================================================================
# WHAT THE SECRET LOOKS LIKE UNDER THE HOOD (for reference only)
# ============================================================================
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: ghcr-oss-sdk
#   labels:
#     app: csharp-sdk-harness-worker
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: <base64-encoded docker config JSON>
#
# The docker config JSON (before base64 encoding) looks like:
#   {"auths":{"ghcr.io":{"username":"...","password":"...","auth":"<base64>"}}}
#
# kubectl create secret docker-registry builds all of this for you.
